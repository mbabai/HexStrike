<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>HexStrike Card Stats</title>
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="stylesheet" href="/public/theme.css" />
    <link rel="stylesheet" href="/public/stats.css" />
  </head>
  <body>
    <main class="ui-shell stats-shell">
      <header class="hero-header">
        <div class="hero-header-content">
          <div class="branding">
            <p class="eyebrow">Deck Analytics</p>
            <h1>Card Stats</h1>
            <p class="subtitle">Distribution and summary stats for timeline beats, combat values, and card archetypes.</p>
          </div>
          <div class="hero-actions">
            <span id="statsCardCount" class="status-pill">Loading cards...</span>
            <a class="btn btn-ghost btn-small" href="/cards">Deck Builder</a>
            <a class="btn btn-ghost btn-small" href="/">Back to Lobby</a>
          </div>
        </div>
      </header>

      <div id="statsGrid" class="stats-grid" aria-live="polite">
        <section class="panel stats-panel">
          <h2>Loading</h2>
          <p>Building card stats...</p>
        </section>
      </div>
    </main>
    <script type="module" src="/public/stats.js"></script>
  </body>
</html>
